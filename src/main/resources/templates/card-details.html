<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Card Details</title>
    <div th:insert="links.html"></div>
</head>
<body>
  <div th:insert="navbar.html"></div>

  <div class="container d-flex justify-content-center" th:object="${product}">
    <div class="card mt-4 mb-4" style="width: 26rem;">
      <img th:src="@{${product.imageUrl}}"
           class="card-img-top img-thumbnail"
           alt="Product img">

      <div class="card-body">
        <h5 class="card-title" th:text="${product.name}"> </h5>
        <label class="form-label">Product category : <span class="card-text" th:text="${product.category.name}"> </span></label>

        <div class="reviews mt-2">
          <div class="accordion" id="reviewsAccordion">
            <div class="accordion-item">
              <!-- BUTTON -->
              <h2 class="accordion-header" id="headingReviews">
                <button class="accordion-button collapsed"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#collapseReviews"
                        aria-expanded="false"
                        aria-controls="collapseReviews">
                  Reviews
                </button>
              </h2>
              <!-- CONTENT -->
              <div id="collapseReviews"
                   class="accordion-collapse collapse"
                   aria-labelledby="headingReviews"
                   data-bs-parent="#reviewsAccordion">
                <div class="accordion-body">
                  <!-- если нет отзывов -->
                  <div th:if="${#lists.isEmpty(product.reviews)}">
                    <p>No reviews yet</p>
                  </div>
                  <!-- список отзывов -->
                  <div th:each="review : ${product.reviews}" class="card p-3 mb-3">
                    <div class="d-flex justify-content-between">
                      <strong th:text="${review.reviewOwner}">owner</strong>
                      <span th:text="${review.createdAt}">date</span>
                    </div>
                    <!-- рейтинг -->
                    <div class="mt-2">
                      <span>
                        <span th:text="${#strings.repeat('⭐', review.rating.ordinal() + 1)}"></span>
                        <span th:text="${#strings.repeat('☆ ', 5 - (review.rating.ordinal() + 1))}"></span>
                      </span>
                    </div>
                    <div class="mt-2">
                      <p th:text="${review.comment}">comment</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div>
          <div class="mt-3">
            <label class="form-label">Price: <b><span th:text="${product.price} + '$'"></span></b></label>
          </div>

          <div class="d-flex justify-content-center gap-3 mt-3">
            <form method="get" th:action="@{'/products/update/' + ${product.id}}">
              <button type="submit" class="btn btn-warning">Update</button>
            </form>
            <form method="post" th:action="@{'/products/delete/' + ${product.id}}">
              <button type="submit" class="btn btn-danger">Delete</button>
            </form>
            <form method="get" th:action="@{'/add-review/' + ${product.id}}">
              <button type="submit" class="btn btn-primary">Leave review</button>
            </form>
          </div>

        </div>
      </div>
    </div>
  </div>
</body>
</html>
