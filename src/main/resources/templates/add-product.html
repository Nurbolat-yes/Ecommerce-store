<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <div th:insert="links.html"></div>
</head>
<body>
<div th:insert="navbar.html"></div>

<div class="container w-25 mt-4">
  <form class="form-control" method="post" action="/products/add">
    <div class="mb-3">
      <label for="name" class="form-label">Product name</label>
      <input type="text" name="name" class="form-control" id="name">
    </div>
    <div class="mb-3">
      <label for="image_url" class="form-label">Product image-url</label>
      <input type="url" name="imageUrl" class="form-control" id="image_url">
    </div>
    <div class="mb-3">
      <label for="price" class="form-label">Product price</label>
      <input type="text" name="price" class="form-control" id="price">
    </div>
    <div class="mb-3">
      <label class="form-label">Choose product category : </label>
      <label>
        <select class="form-select" name="category.id">
          <option th:each="category : ${categories}"
                  th:text="${category.name}"
                  th:value="${category.id}">
          </option>
        </select>
      </label>
    </div>

    <button type="submit" class="btn btn-primary">Create</button>
  </form>
</div>
</body>
</html>
